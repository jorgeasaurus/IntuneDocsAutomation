<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Intune Gazette — What's New</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #F5F0E8;
            --paper-dark: #EDE7DA;
            --ink: #1C1917;
            --ink-light: #57534E;
            --ink-faint: #A8A29E;
            --rule: #C4BAA8;
            --rule-heavy: #78716C;
            --accent: #B91C1C;
            --accent-light: #DC2626;
            --accent-bg: #FEF2F2;
            --serif: 'Playfair Display', 'Georgia', serif;
            --body: 'Crimson Pro', 'Georgia', serif;
            --mono: 'IBM Plex Mono', 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--body);
            font-size: 17px;
            line-height: 1.65;
            color: var(--ink);
            background-color: var(--paper);
            background-image:
                radial-gradient(circle at 1px 1px, rgba(0,0,0,0.03) 1px, transparent 0);
            background-size: 24px 24px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── GRAIN OVERLAY ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        .page-wrapper {
            max-width: 1060px;
            margin: 0 auto;
            padding: 0 28px;
        }

        /* ── MASTHEAD ── */
        .masthead {
            padding: 48px 0 0;
            text-align: center;
            position: relative;
        }

        .masthead-rule {
            height: 4px;
            background: var(--ink);
            margin-bottom: 6px;
        }

        .masthead-rule-thin {
            height: 1px;
            background: var(--ink);
            margin-bottom: 16px;
        }

        .dateline {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ink-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .masthead-title {
            font-family: var(--serif);
            font-size: clamp(2.8rem, 6vw, 4.6rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -0.02em;
            color: var(--ink);
            margin-bottom: 8px;
        }

        .masthead-title em {
            font-style: italic;
            font-weight: 700;
            color: var(--accent);
        }

        .masthead-subtitle {
            font-family: var(--body);
            font-style: italic;
            font-size: 1.15rem;
            font-weight: 300;
            color: var(--ink-light);
            margin-bottom: 16px;
        }

        .masthead-rule-bottom {
            height: 1px;
            background: var(--ink);
            margin-bottom: 4px;
        }

        .masthead-rule-bottom-heavy {
            height: 3px;
            background: var(--ink);
            margin-bottom: 0;
        }

        /* ── TOOLBAR ── */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--rule);
        }

        .toolbar-left {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--ink-faint);
            letter-spacing: 0.05em;
        }

        .refresh-btn {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: var(--ink);
            color: var(--paper);
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .refresh-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: translateX(-101%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .refresh-btn:hover::after {
            transform: translateX(0);
        }

        .refresh-btn span {
            position: relative;
            z-index: 1;
        }

        /* ── SEARCH BAR ── */
        .search-bar {
            display: none;
            padding: 16px 0;
            border-bottom: 1px solid var(--rule);
            position: relative;
        }

        .search-field {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-icon {
            font-family: var(--mono);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ink-faint);
            white-space: nowrap;
        }

        .search-input {
            flex: 1;
            font-family: var(--body);
            font-size: 1rem;
            font-weight: 400;
            color: var(--ink);
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--rule);
            padding: 6px 0;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input::placeholder {
            color: var(--ink-faint);
            font-style: italic;
        }

        .search-input:focus {
            border-bottom-color: var(--ink);
        }

        .search-clear {
            font-family: var(--mono);
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-faint);
            background: none;
            border: 1px solid var(--rule);
            padding: 4px 12px;
            cursor: pointer;
            transition: all 0.15s;
            display: none;
        }

        .search-clear:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .search-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .search-count {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            color: var(--ink-faint);
            display: none;
        }

        .search-kbd {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--ink-faint);
            letter-spacing: 0.05em;
        }

        .search-kbd kbd {
            display: inline-block;
            font-family: var(--mono);
            font-size: 0.58rem;
            color: var(--ink-light);
            background: var(--paper-dark);
            border: 1px solid var(--rule);
            padding: 1px 6px;
            margin: 0 2px;
        }

        mark {
            background: transparent;
            color: var(--accent);
            font-weight: 600;
            font-style: normal;
        }

        .no-results {
            text-align: center;
            padding: 48px 20px;
        }

        .no-results-title {
            font-family: var(--serif);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 6px;
        }

        .no-results-text {
            font-family: var(--body);
            font-size: 0.95rem;
            font-style: italic;
            color: var(--ink-faint);
        }

        /* ── LOADING ── */
        .loading {
            text-align: center;
            padding: 80px 20px;
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--ink-faint);
            letter-spacing: 0.05em;
        }

        .loading-bar {
            width: 120px;
            height: 2px;
            background: var(--rule);
            margin: 16px auto 0;
            position: relative;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 40%;
            height: 100%;
            background: var(--ink);
            animation: loadSlide 1.2s ease-in-out infinite;
        }

        @keyframes loadSlide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        /* ── STATS RIBBON ── */
        .stats-ribbon {
            display: none;
            border-bottom: 1px solid var(--rule);
        }

        .stats-inner {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
        }

        .stat-cell {
            padding: 20px 16px;
            text-align: center;
            position: relative;
        }

        .stat-cell:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0; top: 20%;
            height: 60%;
            width: 1px;
            background: var(--rule);
        }

        .stat-number {
            font-family: var(--serif);
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--ink);
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-label {
            font-family: var(--mono);
            font-size: 0.62rem;
            font-weight: 400;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-faint);
        }

        /* ── TABLE OF CONTENTS (sidebar index) ── */
        .toc-bar {
            display: none;
            padding: 20px 0;
            border-bottom: 1px solid var(--rule);
        }

        .toc-label {
            font-family: var(--mono);
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 12px;
        }

        .toc-grid {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0;
        }

        .toc-grid li {
            flex: 1 1 auto;
        }

        .toc-grid a {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 6px 16px 6px 0;
            text-decoration: none;
            color: var(--ink);
            font-family: var(--body);
            font-size: 0.95rem;
            font-weight: 600;
            border-right: 1px solid var(--rule);
            transition: color 0.15s;
        }

        .toc-grid li:last-child a {
            border-right: none;
        }

        .toc-grid a:hover {
            color: var(--accent);
        }

        .toc-count {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--ink-faint);
            margin-left: 8px;
        }

        /* ── CONTENT AREA ── */
        .content-area {
            padding-top: 8px;
        }

        /* ── CATEGORY SECTIONS ── */
        .category-section {
            padding: 32px 0 24px;
            border-bottom: 1px solid var(--rule);
            opacity: 0;
            transform: translateY(18px);
            animation: revealSection 0.6s ease forwards;
        }

        .category-section:last-child {
            border-bottom: none;
        }

        @keyframes revealSection {
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 24px;
        }

        .section-label {
            font-family: var(--mono);
            font-size: 0.58rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--paper);
            background: var(--ink);
            padding: 3px 10px;
            white-space: nowrap;
        }

        .section-title {
            font-family: var(--serif);
            font-size: 1.7rem;
            font-weight: 700;
            line-height: 1.15;
            color: var(--ink);
        }

        .section-rule {
            height: 2px;
            background: var(--ink);
            margin-bottom: 20px;
        }

        /* ── UPDATE ITEMS ── */
        .updates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .update-card {
            padding: 16px 20px 16px 0;
            border-right: 1px solid var(--rule);
            position: relative;
        }

        .update-card:nth-child(even) {
            padding: 16px 0 16px 20px;
            border-right: none;
        }

        .update-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--rule);
        }

        .update-card:nth-last-child(-n+2)::after {
            display: none;
        }

        .update-headline {
            font-family: var(--serif);
            font-size: 1.08rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--ink);
            margin-bottom: 8px;
        }

        .update-headline a {
            color: inherit;
            text-decoration: none;
            transition: color 0.15s;
        }

        .update-headline a:hover {
            color: var(--accent);
        }

        .update-excerpt {
            font-family: var(--body);
            font-size: 0.92rem;
            font-weight: 300;
            line-height: 1.55;
            color: var(--ink-light);
            margin-bottom: 10px;
        }

        .update-dateline {
            font-family: var(--mono);
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: var(--ink-faint);
            text-transform: uppercase;
        }

        .update-dateline a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.15s;
        }

        .update-dateline a:hover {
            border-bottom-color: var(--accent);
        }

        /* ── Lead story: first item in first category is featured ── */
        .lead-story {
            grid-column: 1 / -1;
            border-right: none;
            padding: 16px 0 20px;
            border-bottom: 2px solid var(--ink);
            margin-bottom: 4px;
        }

        .lead-story::after { display: none; }

        .lead-story .update-headline {
            font-size: 1.65rem;
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 12px;
        }

        .lead-story .update-excerpt {
            font-size: 1.05rem;
            font-weight: 300;
            max-width: 72ch;
        }

        /* ── ERROR STATE ── */
        .error-notice {
            border: 2px solid var(--accent);
            padding: 28px 32px;
            margin: 24px 0;
            position: relative;
        }

        .error-notice::before {
            content: 'NOTICE';
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            color: var(--paper);
            background: var(--accent);
            padding: 2px 10px;
            position: absolute;
            top: -10px;
            left: 20px;
        }

        .error-notice h3 {
            font-family: var(--serif);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .error-notice p {
            font-size: 0.92rem;
            color: var(--ink-light);
            margin-bottom: 6px;
        }

        .error-notice ul {
            margin: 8px 0;
            padding-left: 20px;
            font-size: 0.88rem;
            color: var(--ink-light);
        }

        /* ── FOOTER / COLOPHON ── */
        .colophon {
            padding: 32px 0 48px;
            margin-top: 16px;
            border-top: 3px solid var(--ink);
            text-align: center;
        }

        .colophon-text {
            font-family: var(--mono);
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            color: var(--ink-faint);
            line-height: 1.8;
        }

        .colophon-text a {
            color: var(--ink-light);
            text-decoration: none;
            border-bottom: 1px solid var(--rule);
            transition: color 0.15s, border-color 0.15s;
        }

        .colophon-text a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .colophon-mark {
            font-family: var(--serif);
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--ink);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 720px) {
            body { font-size: 16px; }

            .masthead-title { font-size: clamp(2rem, 8vw, 3rem); }

            .dateline { flex-direction: column; gap: 2px; text-align: center; }

            .stats-inner { grid-template-columns: 1fr; }

            .stat-cell:not(:last-child)::after {
                width: 60%;
                height: 1px;
                right: auto;
                left: 20%;
                top: auto;
                bottom: 0;
            }

            .updates-grid { grid-template-columns: 1fr; }

            .update-card,
            .update-card:nth-child(even) {
                padding: 14px 0;
                border-right: none;
            }

            .lead-story .update-headline { font-size: 1.35rem; }

            .toc-grid { flex-direction: column; }

            .toc-grid a {
                border-right: none;
                border-bottom: 1px solid var(--rule);
                padding: 8px 0;
            }
        }

        /* ── STAGGER ANIMATION ── */
        .category-section:nth-child(1) { animation-delay: 0s; }
        .category-section:nth-child(2) { animation-delay: 0.08s; }
        .category-section:nth-child(3) { animation-delay: 0.16s; }
        .category-section:nth-child(4) { animation-delay: 0.24s; }
        .category-section:nth-child(5) { animation-delay: 0.32s; }
        .category-section:nth-child(6) { animation-delay: 0.40s; }
        .category-section:nth-child(7) { animation-delay: 0.48s; }

        /* ── SCROLL REVEAL ── */
        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .reveal-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="page-wrapper">

        <!-- MASTHEAD -->
        <header class="masthead">
            <div class="masthead-rule"></div>
            <div class="masthead-rule-thin"></div>
            <div class="dateline">
                <span id="editionDate">Loading&hellip;</span>
                <span>Microsoft Learn &middot; RSS Syndication</span>
                <span id="editionLabel">Documentation Feed</span>
            </div>
            <h1 class="masthead-title">The Intune <em>Gazette</em></h1>
            <p class="masthead-subtitle">All the latest documentation updates &mdash; curated &amp; categorized</p>
            <div class="masthead-rule-bottom"></div>
            <div class="masthead-rule-bottom-heavy"></div>
        </header>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="toolbar-left" id="lastRefresh"></div>
            <button class="refresh-btn" onclick="loadFeed()"><span>Refresh Feed</span></button>
        </div>

        <!-- SEARCH -->
        <div id="searchBar" class="search-bar">
            <div class="search-field">
                <span class="search-icon">Search</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Filter dispatches by keyword…" autocomplete="off" spellcheck="false">
                <button id="searchClear" class="search-clear" onclick="clearSearch()">Clear</button>
            </div>
            <div class="search-meta">
                <span id="searchCount" class="search-count"></span>
            </div>
        </div>

        <!-- LOADING -->
        <div id="loading" class="loading">
            Fetching latest dispatches&hellip;
            <div class="loading-bar"></div>
        </div>

        <!-- STATS RIBBON -->
        <div id="stats" class="stats-ribbon">
            <div class="stats-inner" id="statsInner"></div>
        </div>

        <!-- TABLE OF CONTENTS -->
        <nav id="table-of-contents" class="toc-bar">
            <div class="toc-label">Sections</div>
            <ul id="toc-list" class="toc-grid"></ul>
        </nav>

        <!-- CONTENT -->
        <main id="content" class="content-area"></main>

        <!-- COLOPHON -->
        <footer class="colophon">
            <div class="colophon-mark">IG</div>
            <div class="colophon-text">
                Sourced from the <a href="https://docs.microsoft.com/api/search/rss?locale=en-us&facet=&%24filter=scopes%2Fany%28t%3A+t+eq+%27Intune%27%29" target="_blank" rel="noopener">Microsoft Learn RSS Feed</a><br>
                Updated via GitHub Actions &middot; <span id="lastUpdated"></span>
            </div>
        </footer>

    </div>

    <script>
        const LOCAL_RSS_FILE = './intune-rss.xml';
        const RSS_METADATA_FILE = './rss-metadata.json';

        const categoryMapping = {
            'Security & Compliance': ['security', 'compliance', 'baseline', 'protection', 'threat', 'conditional access', 'authentication'],
            'App Management': ['app', 'application', 'store', 'deployment', 'packaging', 'mobile application management', 'mam'],
            'Device Management': ['device', 'enrollment', 'configuration', 'profile', 'autopilot', 'windows', 'android', 'ios', 'macos'],
            'Endpoint Analytics': ['analytics', 'insights', 'reporting', 'performance', 'endpoint analytics', 'proactive remediation'],
            'Policy Updates': ['policy', 'governance', 'assignment', 'group', 'targeting'],
            'Documentation Updates': ['documentation', 'guide', 'tutorial', 'reference', 'troubleshoot', 'how-to'],
            'General Updates': []
        };

        const sectionNumbers = {};
        let sectionCounter = 1;

        let allUpdates = [];

        function categorizeUpdate(title, description) {
            const content = (title + ' ' + description).toLowerCase();
            for (const [category, keywords] of Object.entries(categoryMapping)) {
                if (category === 'General Updates') continue;
                for (const keyword of keywords) {
                    if (content.includes(keyword)) return category;
                }
            }
            return 'General Updates';
        }

        function parseRSSDate(dateString) { return new Date(dateString); }

        function formatDate(date) {
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function formatDateShort(date) {
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
        }

        function isRecentUpdate(pubDate, daysBack = 30) {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - daysBack);
            return new Date(pubDate) > cutoff;
        }

        async function fetchRSSMetadata() {
            try {
                const r = await fetch(RSS_METADATA_FILE);
                if (r.ok) return await r.json();
            } catch (e) { console.log('No metadata file found'); }
            return null;
        }

        async function fetchRSSFeed() {
            const response = await fetch(LOCAL_RSS_FILE);
            if (!response.ok) throw new Error(`Failed to fetch RSS: ${response.status}`);
            const xml = await response.text();
            const doc = new DOMParser().parseFromString(xml, 'text/xml');
            if (doc.documentElement.nodeName === 'parsererror') throw new Error('XML parsing failed');
            return doc;
        }

        function parseRSSItems(xmlDoc) {
            const items = xmlDoc.querySelectorAll('item');
            const all = [];
            items.forEach(item => {
                const title = item.querySelector('title')?.textContent || '';
                const description = item.querySelector('description')?.textContent || '';
                const link = item.querySelector('link')?.textContent || '';
                const pubDate = item.querySelector('pubDate')?.textContent || '';
                if (title) {
                    all.push({
                        title: title.trim(),
                        description: description.trim(),
                        link: link.trim(),
                        pubDate: parseRSSDate(pubDate),
                        category: categorizeUpdate(title, description)
                    });
                }
            });
            all.sort((a, b) => b.pubDate - a.pubDate);
            const recent = all.filter(u => isRecentUpdate(u.pubDate));
            return recent.length > 0 ? recent : all;
        }

        function groupByCategory(updates) {
            const grouped = {};
            updates.forEach(u => {
                if (!grouped[u.category]) grouped[u.category] = [];
                grouped[u.category].push(u);
            });
            return grouped;
        }

        function renderStats(updates) {
            const total = updates.length;
            const cats = [...new Set(updates.map(u => u.category))].length;
            const latest = updates.length > 0 ? updates[0].pubDate : null;

            document.getElementById('statsInner').innerHTML = `
                <div class="stat-cell">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Dispatches</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-number">${cats}</div>
                    <div class="stat-label">Sections</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-number">${latest ? latest.toLocaleDateString('en-US', { month: 'short' }).toUpperCase() : 'N/A'}</div>
                    <div class="stat-label">Latest Edition</div>
                </div>
            `;
            document.getElementById('stats').style.display = 'block';
        }

        function renderTableOfContents(grouped) {
            const tocList = document.getElementById('toc-list');
            const tocDiv = document.getElementById('table-of-contents');
            let html = '';

            for (const [category, items] of Object.entries(grouped)) {
                if (items.length === 0) continue;
                const id = category.replace(/\s+/g, '-').toLowerCase();
                html += `<li><a href="#category-${id}">${category}<span class="toc-count">${items.length}</span></a></li>`;
            }

            if (html) {
                tocList.innerHTML = html;
                tocDiv.style.display = 'block';
            } else {
                tocDiv.style.display = 'none';
            }
        }

        function renderUpdates(updates) {
            const grouped = groupByCategory(updates);
            const contentDiv = document.getElementById('content');
            renderTableOfContents(grouped);

            let html = '';
            let sectionIdx = 0;
            let isFirstCategory = true;

            for (const [category, items] of Object.entries(grouped)) {
                if (items.length === 0) continue;
                sectionIdx++;
                const catId = category.replace(/\s+/g, '-').toLowerCase();
                const sectionNum = String(sectionIdx).padStart(2, '0');

                html += `<section class="category-section" id="category-${catId}" style="animation-delay: ${sectionIdx * 0.08}s">`;
                html += `<div class="section-header">
                    <span class="section-label">§${sectionNum}</span>
                    <h2 class="section-title">${category}</h2>
                </div>`;
                html += `<div class="section-rule"></div>`;
                html += `<div class="updates-grid">`;

                items.forEach((update, i) => {
                    const desc = update.description.length > 180
                        ? update.description.substring(0, 180) + '…'
                        : update.description;

                    const isLead = isFirstCategory && i === 0;
                    const cardClass = isLead ? 'update-card lead-story' : 'update-card';

                    html += `<article class="${cardClass}">
                        <h3 class="update-headline"><a href="${update.link}" target="_blank" rel="noopener">${update.title}</a></h3>
                        <p class="update-excerpt">${desc}</p>
                        <div class="update-dateline">${formatDateShort(update.pubDate)} · <a href="${update.link}" target="_blank" rel="noopener">Read on Microsoft Learn →</a></div>
                    </article>`;
                });

                html += `</div></section>`;
                isFirstCategory = false;
            }

            if (!html) {
                html = `<div class="error-notice"><h3>No Recent Dispatches</h3><p>No updates found in the last 30 days. Check back soon.</p></div>`;
                document.getElementById('table-of-contents').style.display = 'none';
            }

            contentDiv.innerHTML = html;
            initScrollReveal();
        }

        function showError(message, isLocalFile = false) {
            const inner = isLocalFile ? `
                <div class="error-notice">
                    <h3>Sample Data Mode</h3>
                    <p>${message}</p>
                    <p>This page is powered by a GitHub Actions workflow that fetches the RSS feed automatically.</p>
                    <ul>
                        <li>Push this repository to GitHub</li>
                        <li>Enable GitHub Actions and GitHub Pages</li>
                        <li>The workflow refreshes the feed every 6 hours</li>
                    </ul>
                </div>
            ` : `
                <div class="error-notice">
                    <h3>Unable to Load Feed</h3>
                    <p>${message}</p>
                    <p>Please try refreshing or verify the RSS feed is available.</p>
                </div>
            `;
            document.getElementById('content').innerHTML = inner;
        }

        function initScrollReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        e.target.classList.add('visible');
                        observer.unobserve(e.target);
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
        }

        function highlightText(text, query) {
            if (!query) return text;
            const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
        }

        function renderFilteredUpdates(query) {
            const q = query.trim().toLowerCase();
            const countEl = document.getElementById('searchCount');
            const clearBtn = document.getElementById('searchClear');

            if (!q) {
                countEl.style.display = 'none';
                clearBtn.style.display = 'none';
                renderUpdates(allUpdates);
                renderStats(allUpdates);
                return;
            }

            clearBtn.style.display = 'inline-block';

            const filtered = allUpdates.filter(u =>
                u.title.toLowerCase().includes(q) ||
                u.description.toLowerCase().includes(q) ||
                u.category.toLowerCase().includes(q)
            );

            countEl.style.display = 'inline';
            countEl.textContent = `${filtered.length} of ${allUpdates.length} dispatches`;

            if (filtered.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="no-results">
                        <div class="no-results-title">No matches for "${query}"</div>
                        <div class="no-results-text">Try a different keyword or clear the search</div>
                    </div>`;
                document.getElementById('table-of-contents').style.display = 'none';
                return;
            }

            renderStats(filtered);

            const grouped = groupByCategory(filtered);
            const contentDiv = document.getElementById('content');
            renderTableOfContents(grouped);

            let html = '';
            let sectionIdx = 0;
            let isFirstCategory = true;

            for (const [category, items] of Object.entries(grouped)) {
                if (items.length === 0) continue;
                sectionIdx++;
                const catId = category.replace(/\s+/g, '-').toLowerCase();
                const sectionNum = String(sectionIdx).padStart(2, '0');

                html += `<section class="category-section" id="category-${catId}" style="animation-delay: ${sectionIdx * 0.08}s">`;
                html += `<div class="section-header">
                    <span class="section-label">§${sectionNum}</span>
                    <h2 class="section-title">${category}</h2>
                </div>`;
                html += `<div class="section-rule"></div>`;
                html += `<div class="updates-grid">`;

                items.forEach((update, i) => {
                    const desc = update.description.length > 180
                        ? update.description.substring(0, 180) + '…'
                        : update.description;

                    const isLead = isFirstCategory && i === 0;
                    const cardClass = isLead ? 'update-card lead-story' : 'update-card';

                    html += `<article class="${cardClass}">
                        <h3 class="update-headline"><a href="${update.link}" target="_blank" rel="noopener">${highlightText(update.title, query)}</a></h3>
                        <p class="update-excerpt">${highlightText(desc, query)}</p>
                        <div class="update-dateline">${formatDateShort(update.pubDate)} · <a href="${update.link}" target="_blank" rel="noopener">Read on Microsoft Learn →</a></div>
                    </article>`;
                });

                html += `</div></section>`;
                isFirstCategory = false;
            }

            contentDiv.innerHTML = html;
            initScrollReveal();
        }

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            renderFilteredUpdates('');
            input.focus();
        }

        function initSearch() {
            const input = document.getElementById('searchInput');
            let debounceTimer;

            input.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => renderFilteredUpdates(input.value), 150);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== input) {
                    e.preventDefault();
                    input.focus();
                }
                if (e.key === 'Escape' && document.activeElement === input) {
                    if (input.value) {
                        clearSearch();
                    } else {
                        input.blur();
                    }
                }
            });
        }

        async function loadFeed() {
            const loadingDiv = document.getElementById('loading');
            const statsDiv = document.getElementById('stats');
            const contentDiv = document.getElementById('content');

            loadingDiv.style.display = 'block';
            statsDiv.style.display = 'none';
            contentDiv.innerHTML = '';

            try {
                const metadata = await fetchRSSMetadata();
                const xmlDoc = await fetchRSSFeed();
                const updates = parseRSSItems(xmlDoc);

                // Set edition date from feed
                const channelPubDate = xmlDoc.querySelector('channel > pubDate')?.textContent;
                if (channelPubDate) {
                    const d = new Date(channelPubDate);
                    document.getElementById('editionDate').textContent =
                        d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
                    document.getElementById('lastRefresh').textContent =
                        `Feed refreshed: ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })}`;
                } else {
                    const now = new Date();
                    document.getElementById('editionDate').textContent =
                        now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
                }

                loadingDiv.style.display = 'none';

                if (updates.length > 0) {
                    allUpdates = updates;
                    document.getElementById('searchBar').style.display = 'block';
                    renderStats(updates);
                    renderUpdates(updates);
                } else {
                    showError('No recent updates found in the RSS feed.', false);
                }

                const lastUpdatedText = metadata
                    ? `${metadata.lastUpdated} · ${metadata.itemCount} items via GitHub Actions`
                    : new Date().toLocaleString();
                document.getElementById('lastUpdated').textContent = lastUpdatedText;

            } catch (error) {
                loadingDiv.style.display = 'none';
                showError(`Error loading RSS feed: ${error.message}`, false);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSearch();
            loadFeed();
        });
    </script>
</body>
</html>
